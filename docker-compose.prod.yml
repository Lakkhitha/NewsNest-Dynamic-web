version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: newsnest-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: newsnest_prod
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 30s

  backend:
    build: ./backend
    container_name: newsnest-backend-prod
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: newsnest_prod
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_prod_data:
